version: '3.8'

services:
  # The Database Layer
  postgres_db:
    image: postgres:15-alpine
    container_name: attendance_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    # REMOVED PORT EXPOSURE: The database should only be accessible internally by the web_app
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  # The Flask Web Server Layer
  web_app:
    build: .
    container_name: attendance_web
    ports:
      - "127.0.0.1:5000:5000" # Expose only to localhost for your native Caddy to reverse proxy
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres_db:5432/${POSTGRES_DB}
      - TZ=${APP_TZ:-Asia/Manila} # Sets web app timezone
    depends_on:
      - postgres_db
    restart: always
    volumes:
      - .:/app # Mounts local files for real-time development reloading

volumes:
  postgres_data: