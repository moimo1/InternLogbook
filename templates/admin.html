<!DOCTYPE html>
<html lang="en">
<head>
    <title>Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-6 font-sans">
    <div class="max-w-6xl mx-auto space-y-6">

        <!-- Header -->
        <div class="bg-white p-6 rounded-xl shadow-sm flex justify-between items-center border">
            <h1 class="text-2xl font-bold text-gray-800">Attendance Dashboard</h1>
            <a href="/logout" class="bg-red-500 text-white px-4 py-2 rounded-lg text-sm font-semibold hover:bg-red-600">Logout</a>
        </div>

        <!-- Shift Schedule Windows Form Config -->
        <div class="bg-white p-6 rounded-xl shadow-sm border">
            <h2 class="text-lg font-bold text-gray-800 mb-4">Official Office Hours Configuration</h2>
            <form action="/admin/settings" method="POST" class="grid grid-cols-1 md:grid-cols-2 gap-6 ajax-form">
                <div class="space-y-2 border-r pr-6">
                    <span class="text-sm font-bold text-blue-600">MWF Shifts (Mon, Wed, Fri)</span>
                    <div class="flex space-x-4">
                        <div class="w-1/2">
                            <label class="text-xs text-gray-500">Earliest Office Start Time</label>
                            <input type="time" name="mwf_start" value="{{ sched.MWF.start }}" class="w-full border p-2 rounded-md mt-1">
                        </div>
                        <div class="w-1/2">
                            <label class="text-xs text-gray-500">Latest Office Close Time</label>
                            <input type="time" name="mwf_end" value="{{ sched.MWF.end }}" class="w-full border p-2 rounded-md mt-1">
                        </div>
                    </div>
                    <div class="flex space-x-4 mt-2">
                        <div class="w-1/2">
                            <label class="text-xs text-gray-500">Lunch Break Start</label>
                            <input type="time" name="mwf_break_start" value="{{ sched.MWF.break_start or '12:00' }}" class="w-full border p-2 rounded-md mt-1">
                        </div>
                        <div class="w-1/2">
                            <label class="text-xs text-gray-500">Lunch Break End</label>
                            <input type="time" name="mwf_break_end" value="{{ sched.MWF.break_end or '13:00' }}" class="w-full border p-2 rounded-md mt-1">
                        </div>
                    </div>
                </div>
                <div class="space-y-2">
                    <span class="text-sm font-bold text-purple-600">TF Shifts (Tue, Thu)</span>
                    <div class="flex space-x-4">
                        <div class="w-1/2">
                            <label class="text-xs text-gray-500">Earliest Office Start Time</label>
                            <input type="time" name="tf_start" value="{{ sched.TF.start }}" class="w-full border p-2 rounded-md mt-1">
                        </div>
                        <div class="w-1/2">
                            <label class="text-xs text-gray-500">Latest Office Close Time</label>
                            <input type="time" name="tf_end" value="{{ sched.TF.end }}" class="w-full border p-2 rounded-md mt-1">
                        </div>
                    </div>
                    <div class="flex space-x-4 mt-2">
                        <div class="w-1/2">
                            <label class="text-xs text-gray-500">Lunch Break Start</label>
                            <input type="time" name="tf_break_start" value="{{ sched.TF.break_start or '12:00' }}" class="w-full border p-2 rounded-md mt-1">
                        </div>
                        <div class="w-1/2">
                            <label class="text-xs text-gray-500">Lunch Break End</label>
                            <input type="time" name="tf_break_end" value="{{ sched.TF.break_end or '13:00' }}" class="w-full border p-2 rounded-md mt-1">
                        </div>
                    </div>
                </div>
                <div class="md:col-span-2 flex justify-end">
                    <button type="submit" class="bg-blue-600 text-white px-6 py-2 rounded-md text-sm font-bold hover:bg-blue-700">Apply Schedule Changes</button>
                </div>
            </form>
        </div>

        <!-- DYNAMIC CONTENT CONTAINER (ROSTER & LOGS) -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6" id="adminDynamicContent">
            {% include 'partials/admin_content.html' %}
        </div>

    </div>

    <!-- Edit Log Modal -->
    <div id="editLogModal" class="fixed inset-0 bg-gray-600 bg-opacity-50 overflow-y-auto h-full w-full hidden flex items-center justify-center">
        <div class="relative mx-auto p-5 border w-96 shadow-lg rounded-md bg-white">
            <div class="mt-3 text-center">
                <h3 class="text-lg leading-6 text-gray-900 font-bold">Edit Attendance Log</h3>
                <form action="/admin/logs/edit" method="POST" id="editLogForm" class="mt-4 text-left space-y-4">
                    <input type="hidden" name="log_id" id="edit_log_id">
                    <input type="hidden" name="user_id" id="edit_user_id">
                    
                    <div>
                        <label class="text-[11px] font-bold text-gray-500 uppercase tracking-wide block">Action Type</label>
                        <select name="log_type" id="edit_log_type" required class="w-full border p-2 text-xs rounded-md bg-gray-50 mt-1 font-medium text-gray-700 focus:outline-none focus:ring-1 focus:ring-blue-500">
                            <option value="IN">IN (Clock In)</option>
                            <option value="OUT">OUT (Clock Out)</option>
                        </select>
                    </div>
                    
                    <div>
                        <label class="text-[11px] font-bold text-gray-500 uppercase tracking-wide block">Calendar Date</label>
                        <input type="date" name="manual_date" id="edit_log_date" required class="w-full border p-2 text-xs rounded-md bg-gray-50 mt-1 text-gray-700 focus:outline-none focus:ring-1 focus:ring-blue-500">
                    </div>
                    
                    <div>
                        <label class="text-[11px] font-bold text-gray-500 uppercase tracking-wide block">Timestamp Time</label>
                        <input type="time" name="manual_time" id="edit_log_time" required class="w-full border p-2 text-xs rounded-md bg-gray-50 mt-1 text-gray-700 focus:outline-none focus:ring-1 focus:ring-blue-500">
                    </div>
                    
                    <div class="flex space-x-3 pt-2">
                        <button type="button" onclick="closeEditModal()" class="w-1/2 bg-gray-300 hover:bg-gray-400 text-gray-800 text-xs font-bold py-2 rounded-lg transition-colors">
                            Cancel
                        </button>
                        <button type="submit" class="w-1/2 bg-indigo-600 hover:bg-indigo-700 text-white text-xs font-bold py-2 rounded-lg transition-colors shadow-sm">
                            Save Changes
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        function openEditModal(logId, userId, logType, rawDate, rawTime) {
            document.getElementById('edit_log_id').value = logId;
            document.getElementById('edit_user_id').value = userId;
            document.getElementById('edit_log_type').value = logType;
            document.getElementById('edit_log_date').value = rawDate;
            document.getElementById('edit_log_time').value = rawTime;
            
            const modal = document.getElementById('editLogModal');
            modal.classList.remove('hidden');
            modal.classList.add('flex');
        }

        function closeEditModal() {
            const modal = document.getElementById('editLogModal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
        }

        function filterLogs(userId) {
            const rows = document.querySelectorAll('.log-row');
            rows.forEach(row => {
                if (userId === "" || row.getAttribute('data-user-id') === userId) {
                    row.style.display = "";
                } else {
                    row.style.display = "none";
                }
            });

            const exportBtn = document.getElementById('exportExcelBtn');
            if (exportBtn) {
                exportBtn.href = `/admin/export?filter_user=${encodeURIComponent(userId)}`;
            }
        }

        // Partial component fetcher function for seamless, non-reloading updates
        async function refreshAdminComponents(forceUpdateForms = false) {
            try {
                const filterUserSelect = document.getElementById('filter_user');
                const selectedVal = filterUserSelect ? filterUserSelect.value : "";
                
                const response = await fetch(`/admin?partial=1&filter_user=${encodeURIComponent(selectedVal)}`);
                if (response.ok) {
                    const html = await response.text();
                    
                    const temp = document.createElement('div');
                    temp.innerHTML = html;
                    
                    const updateElement = (id) => {
                        const el = document.getElementById(id);
                        const newEl = temp.querySelector(`#${id}`);
                        if (el && newEl) el.innerHTML = newEl.innerHTML;
                    };

                    // Preserve the current filter value before the container is wiped
                    const currentFilter = document.getElementById('filter_user');
                    const preservedFilterVal = currentFilter ? currentFilter.value : "";

                    // Only update the parts that don't have active user input
                    updateElement('internRoster');
                    updateElement('logTableContainer');
                    
                    // Re-apply the user's choice to the newly injected dropdown
                    const newFilter = document.getElementById('filter_user');
                    if (newFilter) {
                        newFilter.value = preservedFilterVal;
                    }
                    
                    // Update forms only on manual submissions to avoid wiping user input
                    if (forceUpdateForms) {
                        updateElement('createInternFormContainer');
                        updateElement('missedLogFormContainer');
                    }

                    filterLogs(preservedFilterVal);
                }
            } catch (err) {
                console.error("Background refresh failed:", err);
            }
        }

        // Global delegate for smooth AJAX form submissions without full-page reloads
        document.addEventListener('submit', async function(e) {
            if (e.target.classList.contains('ajax-form') || e.target.id === 'editLogForm') {
                e.preventDefault();
                const form = e.target;
                const formData = new FormData(form);
                
                try {
                    await fetch(form.action, {
                        method: form.method || 'POST',
                        body: formData
                    });
                    if (form.id === 'editLogForm') {
                        closeEditModal();
                    } else {
                        form.reset();
                    }
                    // Sync the forms to update dropdowns and lists after an explicit action
                    await refreshAdminComponents(true);
                } catch (err) {
                    console.error("AJAX form submission failed:", err);
                }
            }
        });

        // 4-second live background polling (only updates roster and logs)
        setInterval(() => refreshAdminComponents(false), 4000);

        // Apply active filter on page load if one was selected
        window.addEventListener('DOMContentLoaded', (event) => {
            const filterUserSelect = document.getElementById('filter_user');
            if (filterUserSelect && filterUserSelect.value) {
                filterLogs(filterUserSelect.value);
            }
        });
    </script>
</body>
</html>
